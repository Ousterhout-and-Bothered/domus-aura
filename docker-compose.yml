services:
  backend:
    build:
      context: .
      dockerfile: backend/src/SmartHome.Api/Dockerfile
    ports:
      - "5137:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/smarthome.db
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
