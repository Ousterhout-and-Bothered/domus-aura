services:
  backend:
    build:
      context: .
      dockerfile: backend/src/SmartHome.Api/Dockerfile
    ports:
      - "5137:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/smarthome.db
      - Authentication__Authority=http://keycloak:8080/realms/smarthome
      - Authentication__Audience=smarthome-spa
      - Authentication__ValidIssuer=http://localhost:8080/realms/smarthome
      - Authentication__RequireHttpsMetadata=false
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      keycloak:
        condition: service_healthy

  frontend:
    build:
      context: frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: smarthome-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q 'UP'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s