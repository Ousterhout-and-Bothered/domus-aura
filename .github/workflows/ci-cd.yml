name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_API_REPOSITORY: domus-aura-api
  ECR_FRONTEND_REPOSITORY: domus-aura-frontend

jobs:
  backend:
    name: Backend - Lint, Build, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore SmartHome.sln

      - name: Check backend formatting
        run: dotnet format SmartHome.sln --verify-no-changes --verbosity diagnostic

      - name: Build backend
        run: dotnet build SmartHome.sln --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test SmartHome.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend - Lint, Build, Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test

  docker:
    name: Build and Push Docker Images to ECR
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          API_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_API_REPOSITORY }}

          docker build \
            -t $API_IMAGE:${{ github.sha }} \
            -t $API_IMAGE:latest \
            -f backend/src/SmartHome.Api/Dockerfile .

          docker push $API_IMAGE:${{ github.sha }}
          docker push $API_IMAGE:latest

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPOSITORY }}

          docker build \
            -t $FRONTEND_IMAGE:${{ github.sha }} \
            -t $FRONTEND_IMAGE:latest \
            -f frontend/Dockerfile frontend

          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest